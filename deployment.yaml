apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-api
  namespace: student
  labels:
    app: student-api

spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: student-api

  template:
    metadata:
      labels:
        app: student-api

    spec:
      imagePullSecrets:
      - name: regcred

      terminationGracePeriodSeconds: 30

      volumes:
      - name: logs
        emptyDir: {}

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
      - name: student-api
        image: ghcr.io/avhad-enterprises/student-marketplace-backend
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: student-config
        - secretRef:
            name: student-secret

        volumeMounts:
        - name: logs
          mountPath: /app/build/logs

        startupProbe:
          httpGet:
            path: /health
            port: 5000
          failureThreshold: 30
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 5

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
